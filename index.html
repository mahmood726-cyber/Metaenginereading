<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M6: Meta-Analysis Engine (v15 Final)</title>
    <script src="tailwind.js"></script>
    <!-- fonts removed for offline use -->
    <!-- Font Awesome CDN removed for offline use; icon <i> tags degrade to empty inline elements -->
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Forest Plot Styles */
        .forest-line { stroke: #475569; stroke-width: 2; stroke-linecap: round; }
        .forest-box { fill: #3b82f6; opacity: 0.9; cursor: pointer; transition: opacity 0.2s; }
        .forest-box:hover { opacity: 1; stroke: #1e3a8a; stroke-width: 1; }
        .forest-diamond { fill: #dc2626; stroke: #991b1b; stroke-width: 1; }
        .forest-pi { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 4,4; stroke-opacity: 0.6; }
        .forest-axis { stroke: #94a3b8; stroke-width: 1; }
        .forest-grid { stroke: #e2e8f0; stroke-dasharray: 4; stroke-width: 1; }
        .forest-null { stroke: #64748b; stroke-width: 1; stroke-dasharray: 5,5; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- HEADER -->
    <header class="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center z-20">
        <div>
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-chart-pie text-emerald-400"></i>
                MODULE 6: META-ENGINE PRO
            </h1>
            <p class="text-xs text-slate-400 mt-1">
                HKSJ Adjustment • Prediction Intervals • Constitutional Safety
            </p>
        </div>
        <div class="flex gap-3">
            <label class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm font-bold border border-slate-600 transition cursor-pointer flex items-center gap-2 shadow-sm">
                <i class="fas fa-file-upload text-emerald-400"></i> Import JSONs
                <input type="file" id="file-input" multiple accept=".json" class="hidden" onchange="App.handleFiles(this.files)">
            </label>
            <button onclick="App.runAnalysis()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded text-sm font-bold shadow-md transition text-white flex items-center gap-2">
                <i class="fas fa-calculator"></i> Calculate
            </button>
        </div>
    </header>

    <!-- MAIN WORKSPACE -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- LEFT: EVIDENCE LIST -->
        <div class="w-1/3 bg-white border-r border-slate-200 flex flex-col z-10 shadow-lg relative">
            
            <!-- List Header -->
            <div class="p-3 bg-slate-50 border-b border-slate-200 font-bold text-slate-700 text-xs uppercase flex justify-between items-center">
                <span><i class="fas fa-list mr-2 text-indigo-500"></i>Evidence List</span>
                <span id="study-count" class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-[10px] border border-indigo-200">0 studies</span>
            </div>
            
            <!-- Study List Container -->
            <div id="study-list" class="flex-1 overflow-y-auto p-0 bg-slate-50/50">
                <!-- Empty State -->
                <div class="h-full flex flex-col items-center justify-center text-slate-400">
                    <i class="fas fa-file-medical-alt text-4xl mb-3 opacity-20"></i>
                    <p class="text-xs font-bold uppercase tracking-wider">No Data Loaded</p>
                    <p class="text-[10px] mt-1">Import outputs from System v12/v13</p>
                    <button onclick="App.loadDemoData()" class="mt-4 text-xs text-indigo-600 hover:text-indigo-800 underline">
                        Load SGLT2i Demo Data
                    </button>
                </div>
            </div>

            <!-- Analysis Configuration -->
            <div class="p-4 border-t border-slate-200 bg-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-xs font-bold text-slate-500 uppercase">Pooling Method</h3>
                    <div class="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-mono">Log Scale</div>
                </div>
                
                <div class="flex gap-2 mb-3">
                    <label class="flex-1 relative cursor-pointer group">
                        <input type="radio" name="model" value="fixed" class="peer sr-only" onchange="App.runAnalysis()">
                        <div class="p-2 border rounded text-center text-xs font-bold text-slate-500 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition">
                            Fixed (IV)
                        </div>
                    </label>
                    <label class="flex-1 relative cursor-pointer group">
                        <input type="radio" name="model" value="random" class="peer sr-only" checked onchange="App.runAnalysis()">
                        <div class="p-2 border rounded text-center text-xs font-bold text-slate-500 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition">
                            Random (DL)
                        </div>
                    </label>
                </div>

                <!-- Advanced Options -->
                <div class="flex items-center gap-3 pt-2 border-t border-slate-100">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="use-hksj" class="accent-emerald-600 rounded" checked onchange="App.runAnalysis()">
                        <span class="text-[10px] font-bold text-slate-600">HKSJ Adjustment</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="show-pi" class="accent-emerald-600 rounded" checked onchange="App.runAnalysis()">
                        <span class="text-[10px] font-bold text-slate-600">Prediction Interval</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- RIGHT: FOREST PLOT & STATISTICS -->
        <div class="w-2/3 bg-white flex flex-col relative">
            
            <!-- Statistics Bar -->
            <div class="h-16 bg-white border-b border-slate-200 flex items-center px-6 justify-between shadow-sm z-10">
                <div class="flex gap-8 divide-x divide-slate-100">
                    
                    <!-- Pooled Effect -->
                    <div class="pr-6">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Pooled Effect</p>
                        <div class="flex items-baseline gap-2">
                            <span class="text-xl font-bold text-slate-800" id="stat-pool">--</span>
                            <span class="text-xs font-mono text-slate-500" id="stat-ci">[ -- ]</span>
                        </div>
                    </div>

                    <!-- Heterogeneity -->
                    <div class="px-6">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Heterogeneity</p>
                        <div class="flex items-baseline gap-3">
                            <div>
                                <span class="text-xs text-slate-500 mr-1">I²=</span>
                                <span class="text-lg font-bold text-slate-700" id="stat-i2">--</span>
                            </div>
                            <div>
                                <span class="text-xs text-slate-500 mr-1">τ²=</span>
                                <span class="text-lg font-bold text-slate-700" id="stat-tau">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- Significance -->
                    <div class="px-6">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">p-Value</p>
                        <div class="flex items-baseline gap-1">
                            <span class="text-xl font-bold text-slate-700" id="stat-p">--</span>
                        </div>
                    </div>
                </div>

                <!-- Tools -->
                <div class="flex gap-2">
                    <button onclick="App.downloadPlot()" class="text-xs bg-white border border-slate-300 text-slate-600 px-3 py-1.5 rounded hover:bg-slate-50 hover:text-slate-800 transition flex items-center gap-2">
                        <i class="fas fa-download"></i> Save SVG
                    </button>
                </div>
            </div>

            <!-- Visualization Canvas -->
            <div class="flex-1 p-8 overflow-auto flex items-start justify-center bg-slate-50/30" id="plot-wrapper">
                <div id="plot-container" class="bg-white p-4 rounded shadow-sm border border-slate-100 min-w-[600px] min-h-[400px] flex items-center justify-center">
                    <p class="text-slate-300 italic text-sm">
                        <i class="fas fa-arrow-left mr-2"></i> Import data to generate forest plot
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIC: STATS + META-ANALYSIS ENGINE (pure core, single source of truth) -->
    <script src="engine.js"></script>

    <!-- LOGIC: FOREST-PLOT RENDERER + UI (the pure stat methods now live in engine.js;
         renderForest is attached onto the engine's MetaEngine object below) -->
    <script>
        if (typeof MetaEngine === 'undefined') {
            throw new Error('engine.js failed to load — MetaEngine is undefined');
        }

        // 4. RENDERER (Safe DOM) — attached to the engine object loaded from engine.js
        MetaEngine.renderForest = function (res, containerId) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';

                const w = 700;
                const topPad = 60;
                const bottomPad = 50;
                const rowHeight = 35;
                const h = topPad + (res.studies.length * rowHeight) + bottomPad;
                const leftPad = 150; 
                const rightPad = 100; 
                const plotW = w - leftPad - rightPad;
                
                // Determine Range including PI
                const lows = res.studies.map(s => s.lo).concat([res.ciLo]);
                const highs = res.studies.map(s => s.hi).concat([res.ciHi]);
                // Only include PI in range if valid
                if (res.piLo && res.piHi) { lows.push(res.piLo); highs.push(res.piHi); }
                
                const minData = Math.min(...lows);
                const maxData = Math.max(...highs);
                
                let minDomain = Math.max(0.01, minData * 0.8);
                let maxDomain = maxData * 1.2;
                if (minDomain > 0.8) minDomain = 0.5;
                if (maxDomain < 1.2) maxDomain = 1.5;

                const logMin = Math.log(minDomain);
                const logMax = Math.log(maxDomain);
                const xScale = (val) => leftPad + ((Math.log(val) - logMin) / (logMax - logMin)) * plotW;

                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("width", w);
                svg.setAttribute("height", h);
                svg.style.fontFamily = "Inter, sans-serif";
                svg.style.fontSize = "12px";

                // A. Grid
                const x1 = xScale(1);
                const lineNull = document.createElementNS("http://www.w3.org/2000/svg", "line");
                lineNull.setAttribute("x1", x1); lineNull.setAttribute("x2", x1);
                lineNull.setAttribute("y1", topPad - 10); lineNull.setAttribute("y2", h - bottomPad + 10);
                lineNull.setAttribute("class", "forest-null");
                svg.appendChild(lineNull);

                // B. Studies
                res.studies.forEach((s, i) => {
                    const y = topPad + (i * rowHeight) + (rowHeight/2);
                    
                    // Label
                    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    label.setAttribute("x", 10); label.setAttribute("y", y + 4);
                    label.textContent = s.id;
                    svg.appendChild(label);

                    // Values
                    const val = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    val.setAttribute("x", w - 10); val.setAttribute("y", y + 4);
                    val.setAttribute("text-anchor", "end");
                    val.textContent = `${s.hr.toFixed(2)} [${s.lo.toFixed(2)}, ${s.hi.toFixed(2)}]`;
                    svg.appendChild(val);

                    // CI Line
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", xScale(s.lo)); line.setAttribute("x2", xScale(s.hi));
                    line.setAttribute("y1", y); line.setAttribute("y2", y);
                    line.setAttribute("class", "forest-line");
                    svg.appendChild(line);

                    // Point Box
                    const xPoint = xScale(s.hr);
                    const boxSize = Math.min(14, Math.max(4, Math.sqrt(s.plotWeight) * 1.5)); 
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", xPoint - boxSize/2); rect.setAttribute("y", y - boxSize/2);
                    rect.setAttribute("width", boxSize); rect.setAttribute("height", boxSize);
                    rect.setAttribute("class", "forest-box");
                    const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
                    title.textContent = `Weight: ${s.plotWeight.toFixed(1)}%`;
                    rect.appendChild(title);
                    svg.appendChild(rect);
                });

                // C. Pooled Diamond & PI
                const yPool = h - bottomPad / 1.5;
                const xPool = xScale(res.effect);
                const xPoolLo = xScale(res.ciLo);
                const xPoolHi = xScale(res.ciHi);
                
                // Prediction Interval Whiskers
                if (res.piLo && res.piHi) {
                    const xPILo = xScale(res.piLo);
                    const xPIHi = xScale(res.piHi);
                    const piLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    piLine.setAttribute("x1", xPILo); piLine.setAttribute("x2", xPIHi);
                    piLine.setAttribute("y1", yPool); piLine.setAttribute("y2", yPool);
                    piLine.setAttribute("class", "forest-pi");
                    // Append BEFORE diamond so diamond is on top
                    svg.appendChild(piLine);
                    
                    // Optional: Tiny caps for PI
                    const capH = 4;
                    const cap1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    cap1.setAttribute("x1", xPILo); cap1.setAttribute("x2", xPILo);
                    cap1.setAttribute("y1", yPool - capH); cap1.setAttribute("y2", yPool + capH);
                    cap1.setAttribute("stroke", "#ef4444");
                    svg.appendChild(cap1);
                    
                    const cap2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    cap2.setAttribute("x1", xPIHi); cap2.setAttribute("x2", xPIHi);
                    cap2.setAttribute("y1", yPool - capH); cap2.setAttribute("y2", yPool + capH);
                    cap2.setAttribute("stroke", "#ef4444");
                    svg.appendChild(cap2);
                }

                const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                const dPts = `${xPoolLo},${yPool} ${xPool},${yPool-6} ${xPoolHi},${yPool} ${xPool},${yPool+6}`;
                diamond.setAttribute("points", dPts);
                diamond.setAttribute("class", "forest-diamond");
                svg.appendChild(diamond);

                // Pooled Label
                const poolLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                poolLabel.setAttribute("x", 10); poolLabel.setAttribute("y", yPool + 4);
                poolLabel.setAttribute("font-weight", "bold");
                poolLabel.textContent = res.modelName;
                svg.appendChild(poolLabel);

                const poolVal = document.createElementNS("http://www.w3.org/2000/svg", "text");
                poolVal.setAttribute("x", w - 10); poolVal.setAttribute("y", yPool + 4);
                poolVal.setAttribute("text-anchor", "end");
                poolVal.setAttribute("font-weight", "bold");
                poolVal.textContent = `${res.effect.toFixed(2)} [${res.ciLo.toFixed(2)}, ${res.ciHi.toFixed(2)}]`;
                svg.appendChild(poolVal);

                // D. Axis Ticks
                const ticks = [0.1, 0.2, 0.5, 1, 2, 5, 10].filter(t => t >= minDomain && t <= maxDomain);
                ticks.forEach(t => {
                    const tx = xScale(t);
                    const tickLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    tickLine.setAttribute("x1", tx); tickLine.setAttribute("x2", tx);
                    tickLine.setAttribute("y1", h - 15); tickLine.setAttribute("y2", h - 11);
                    tickLine.setAttribute("stroke", "#94a3b8");
                    svg.appendChild(tickLine);

                    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    txt.setAttribute("x", tx); txt.setAttribute("y", h);
                    txt.setAttribute("text-anchor", "middle");
                    txt.setAttribute("font-size", "10");
                    txt.setAttribute("fill", "#64748b");
                    txt.textContent = t;
                    svg.appendChild(txt);
                });

                container.appendChild(svg);
        };

        // =================================================================
        // UI & ORCHESTRATION
        // =================================================================
        const App = {
            studies: [],
            results: null,

            handleFiles(files) {
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const json = JSON.parse(e.target.result);
                            // Synthesize an ID if missing
                            json.id = json.id || file.name.replace('.json', '');
                            this.studies.push(json);
                            
                            // Re-render when all loaded
                            if (this.studies.length === files.length) {
                                this.updateUI();
                            }
                        } catch (err) { console.error("Bad JSON", err); }
                    };
                    reader.readAsText(file);
                });
            },

            loadDemoData() {
                // SGLT2i Meta-Analysis Demo Data
                this.studies = [
                    { id: "DAPA-HF", verdict: { status: "PASS", docket: { 'contrast.effect': {value: 0.74}, 'contrast.ciLo': {value: 0.65}, 'contrast.ciHi': {value: 0.85} } } },
                    { id: "EMPEROR-Reduced", verdict: { status: "PASS", docket: { 'contrast.effect': {value: 0.75}, 'contrast.ciLo': {value: 0.65}, 'contrast.ciHi': {value: 0.86} } } },
                    { id: "SOLOIST-WHF", verdict: { status: "WARN", docket: { 'contrast.effect': {value: 0.67}, 'contrast.ciLo': {value: 0.52}, 'contrast.ciHi': {value: 0.85} } } }, // Status WARN still includes
                    { id: "DELIVER", verdict: { status: "PASS", docket: { 'contrast.effect': {value: 0.82}, 'contrast.ciLo': {value: 0.73}, 'contrast.ciHi': {value: 0.92} } } },
                    { id: "EMPEROR-Preserved", verdict: { status: "PASS", docket: { 'contrast.effect': {value: 0.79}, 'contrast.ciLo': {value: 0.69}, 'contrast.ciHi': {value: 0.90} } } },
                    { id: "BAD-DATA-TRIAL", verdict: { status: "FAIL", docket: { 'contrast.effect': {value: 0.01}, 'contrast.ciLo': {value: 0.01}, 'contrast.ciHi': {value: 0.99} } } } // Should be excluded
                ];
                this.updateUI();
            },

            updateUI() {
                this.renderList();
                this.runAnalysis();
            },

            renderList() {
                const list = document.getElementById('study-list');
                const count = document.getElementById('study-count');
                list.innerHTML = '';
                
                let included = 0;

                this.studies.forEach(s => {
                    // Safe access pattern for list rendering
                    const verdict = s.verdict || {};
                    const status = verdict.status || 'UNKNOWN';
                    
                    // SAFETY FIX: Treat NO STATUS as EXCLUDED
                    const isFail = !verdict.status || status.includes('FAIL');
                    
                    if (!isFail) included++;

                    const div = document.createElement('div');
                    div.className = `p-3 border-b flex justify-between items-center ${isFail ? 'bg-red-50 opacity-60' : 'bg-white'}`;
                    
                    let badge = isFail 
                        ? `<span class="px-2 py-1 bg-red-100 text-red-700 text-[10px] rounded font-bold border border-red-200">EXCLUDED</span>`
                        : `<span class="px-2 py-1 bg-emerald-100 text-emerald-700 text-[10px] rounded font-bold border border-emerald-200">INCLUDED</span>`;

                    // Robust Summary Construction
                    const docket = verdict.docket || {};
                    let summary = 'Invalid Data';
                    
                    // Option 1: Reconstruct from docket
                    if (docket['contrast.effect'] && docket['contrast.ciLo'] && docket['contrast.ciHi']) {
                         summary = `HR ${docket['contrast.effect'].value} [${docket['contrast.ciLo'].value}-${docket['contrast.ciHi'].value}]`;
                    } 
                    // Option 2: Use analysis_ready if available
                    else if (s.analysis_ready && s.analysis_ready.effect) {
                         const ar = s.analysis_ready;
                         summary = `${ar.metric || 'Effect'} ${ar.effect.toFixed(2)} [${ar.ci_lo.toFixed(2)}-${ar.ci_hi.toFixed(2)}]`;
                    }
                    // Option 3: Fallback for failed/incomplete
                    else if (isFail) {
                         summary = verdict.statusDetail || 'Constitutional Fail';
                    }

                    div.innerHTML = `<div><div class="font-bold text-sm text-slate-700 truncate w-32" title="${s.id}">${s.id}</div><div class="text-[10px] text-slate-500 font-mono">${summary}</div></div>${badge}`;
                    list.appendChild(div);
                });
                count.textContent = `${included} / ${this.studies.length} included`;
            },

            runAnalysis() {
                const modelRadio = document.querySelector('input[name="model"]:checked');
                if (!modelRadio) return;
                const model = modelRadio.value;
                const useHksj = document.getElementById('use-hksj').checked;
                const showPI = document.getElementById('show-pi').checked;
                
                const { data, errors } = MetaEngine.prepareData(this.studies);
                if (errors.length > 0) console.warn("Exclusions:", errors);

                const result = MetaEngine.pool(data, model, useHksj);
                
                if (!result) {
                    document.getElementById('plot-container').innerHTML = '<p class="text-slate-300 italic text-sm">Insufficient valid data.</p>';
                    ['stat-pool','stat-ci','stat-i2','stat-tau','stat-p'].forEach(id => document.getElementById(id).textContent = '--');
                    return;
                }

                // PI Toggle Logic
                if (!showPI) { result.piLo = null; result.piHi = null; }

                document.getElementById('stat-pool').textContent = result.effect.toFixed(2);
                document.getElementById('stat-ci').textContent = `[${result.ciLo.toFixed(2)} - ${result.ciHi.toFixed(2)}]`;
                
                // Heterogeneity Reset (Bug Fix for k=1)
                if (result.studies.length > 1) {
                    document.getElementById('stat-i2').textContent = `${result.I2.toFixed(0)}%`;
                    document.getElementById('stat-tau').textContent = result.tau2.toFixed(3);
                } else {
                    document.getElementById('stat-i2').textContent = '--';
                    document.getElementById('stat-tau').textContent = '--';
                }
                
                document.getElementById('stat-p').textContent = result.p < 0.001 ? '<0.001' : result.p.toFixed(3);
                
                MetaEngine.renderForest(result, 'plot-container');
            },

            downloadPlot() {
                const svg = document.querySelector('#plot-container svg');
                if (!svg) { alert("No forest plot."); return; }
                const data = (new XMLSerializer()).serializeToString(svg);
                const blob = new Blob([data], {type: 'image/svg+xml;charset=utf-8'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'meta_analysis.svg';
                a.click();
            }
        };

        App.loadDemoData();
    </script>
</body>
</html>
